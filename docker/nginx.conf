# Map upgrade header so WebSocket upgrades (socket.io) pass through cleanly.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream blind_four_server {
  server 127.0.0.1:3001;
  keepalive 32;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Forward /api/* to the in-container game server, stripping the /api prefix.
  # The trailing slash on proxy_pass replaces the matched /api/ portion of the
  # request URI, so /api/socket.io/...  -> /socket.io/...
  location /api/ {
    proxy_pass http://blind_four_server/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Hashed assets (vite emits content-hashed filenames) - long immutable cache.
  location ~* \.(?:js|mjs|css|woff2?|ttf|otf|png|jpe?g|gif|svg|webp|ico|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback. index.html itself stays uncached so deploys take effect.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
